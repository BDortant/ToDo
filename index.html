<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <!-- Toolbar -->
    <header class="toolbar">
        <h1>ToDo</h1>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="App.importData(event)">
    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-section">
            <h2>Views</h2>
            <ul class="view-toggle" id="view-toggle">
                <li class="active" data-view="all" onclick="App.setView('all')">All Items</li>
                <li data-view="by-project" onclick="App.setView('by-project')">By Project</li>
            </ul>
        </div>
        <div class="sidebar-section">
            <h2>Projects</h2>
            <ul class="project-list" id="project-list"></ul>
            <button class="btn btn-primary btn-small" style="margin-top:8px;width:100%" onclick="App.openProjectModal()">+ New Project</button>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main">
        <div class="backup-banner" id="backup-banner">
            <p>It's been over 24 hours since your last backup.</p>
            <div style="display:flex;gap:8px">
                <button class="btn btn-primary btn-small" onclick="App.exportData()">Backup Now</button>
                <button class="btn btn-secondary btn-small" onclick="App.dismissBackupBanner()">Dismiss</button>
            </div>
        </div>

        <div class="main-header">
            <h2 id="main-title">All Items</h2>
            <div class="main-header-actions">
                <button class="btn btn-primary" onclick="App.openTodoModal()">+ New To-Do</button>
                <span class="header-divider"></span>
                <button class="btn btn-outline btn-small" onclick="App.cleanup()" title="Remove tasks done more than 1 working day ago">🧹 Cleanup</button>
                <button class="btn btn-outline btn-small" onclick="App.exportData()" title="Export backup">📥 Export</button>
                <button class="btn btn-outline btn-small" onclick="document.getElementById('import-file').click()" title="Import backup">📤 Import</button>
            </div>
        </div>

        <div class="filters-bar">
            <select id="filter-status" onchange="App.render()">
                <option value="">All Statuses</option>
                <option value="To Do">To Do</option>
                <option value="In Progress">In Progress</option>
                <option value="Waiting on Client">Waiting on Client</option>
                <option value="Waiting on Me">Waiting on Me</option>
                <option value="Waiting on Third Party">Waiting on Third Party</option>
                <option value="On Hold">On Hold</option>
                <option value="In Review">In Review</option>
                <option value="Done">Done</option>
                <option value="Cancelled">Cancelled</option>
            </select>
            <select id="filter-effort" onchange="App.render()">
                <option value="">All Efforts</option>
                <option value="small">Small</option>
                <option value="medium">Medium</option>
                <option value="large">Large</option>
            </select>
            <input type="text" id="filter-search" placeholder="Search..." oninput="App.render()">
            <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;margin-left:8px">
                <input type="checkbox" id="filter-hide-done" onchange="App.toggleFilter('hide-done')"> Hide done
            </label>
            <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;margin-left:8px">
                <input type="checkbox" id="filter-daily" onchange="App.toggleFilter('daily')"> Daily
            </label>
        </div>

        <div id="main-content"></div>
    </main>
</div>

<!-- Todo Modal -->
<div class="modal-backdrop" id="todo-modal">
    <div class="modal">
        <h3 id="todo-modal-title">New To-Do</h3>
        <form onsubmit="App.saveTodo(event)">
            <input type="hidden" id="todo-id">

            <div class="form-group">
                <label>Title *</label>
                <input type="text" id="todo-title" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Project</label>
                    <select id="todo-project"></select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="todo-status">
                        <option>To Do</option>
                        <option>In Progress</option>
                        <option>Waiting on Client</option>
                        <option>Waiting on Me</option>
                        <option>Waiting on Third Party</option>
                        <option>On Hold</option>
                        <option>In Review</option>
                        <option>Done</option>
                        <option>Cancelled</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Effort</label>
                    <select id="todo-effort">
                        <option value="">—</option>
                        <option value="small">Small</option>
                        <option value="medium">Medium</option>
                        <option value="large">Large</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Deadline</label>
                    <input type="date" id="todo-deadline">
                </div>
                <div class="form-group">
                    <label>Assignee</label>
                    <input type="text" id="todo-assignee">
                </div>
            </div>

            <div class="form-group">
                <label>Tags</label>
                <div class="tags-container" id="tags-container" onclick="document.getElementById('tags-input').focus()">
                    <input type="text" class="tags-input" id="tags-input" placeholder="Type and press Enter">
                </div>
            </div>

            <div class="form-group">
                <label>Notes</label>
                <textarea id="todo-notes"></textarea>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="App.closeTodoModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Project Modal -->
<div class="modal-backdrop" id="project-modal">
    <div class="modal">
        <h3 id="project-modal-title">New Project</h3>
        <form onsubmit="App.saveProject(event)">
            <input type="hidden" id="project-id">
            <div class="form-group">
                <label>Project Name *</label>
                <input type="text" id="project-name" required>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="App.closeProjectModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
